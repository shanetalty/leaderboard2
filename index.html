<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<style>
  @font-face {
    font-family: 'noigrotesk';
    src: url('NoiGrotesk-Semibold.woff2') format('woff2'),
         url('NoiGrotesk-Semibold.woff') format('woff');
    font-weight: 600;
  }

  @font-face {
    font-family: 'noigrotesk';
    src: url('NoiGrotesk-Regular.woff2') format('woff2'),
         url('NoiGrotesk-Regular.woff') format('woff');
    font-weight: 400;
  }

  :root {
    --bg-image: url('cartrawlerbg.png');
    --font-display: 'noigrotesk', sans-serif;
    --font-body: 'noigrotesk', sans-serif;
    --accent: #FFD700;
    --card-bg: rgba(0, 0, 0, 0.55);
    --card-border: rgba(255, 255, 255, 0.12);
    --text-primary: #ffffff;
    --text-muted: rgba(255,255,255,0.6);
    --row-hover: rgba(255,255,255,0.06);
    --top1: #FFD700;
    --top2: #C0C0C0;
    --top3: #CD7F32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg-image) center / cover no-repeat fixed #0a0a1a;
    color: var(--text-primary);
  }

  #app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 2rem;
  }

  .board-title {
    font-family: var(--font-display);
    font-size: 3rem;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 1rem;
  }

  .board-wrap {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .board-col-headers {
    display: grid;
    grid-template-columns: 70px 1fr 120px 120px;
    padding: 14px 24px;
    font-size: 0.9rem;
    color: var(--text-muted);
  }

  #entries-scroll {
    overflow: hidden; /* 👈 important */
    height: calc(80px * 10); /* 👈 exactly 10 rows visible */
  }

  .entry {
    display: grid;
    grid-template-columns: 70px 1fr 120px 120px;
    align-items: center;
    padding: 0 24px;
    height: 80px;
    font-size: 1.8rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .entry-pos.gold { color: var(--top1); }
  .entry-pos.silver { color: var(--top2); }
  .entry-pos.bronze { color: var(--top3); }

  .entry-name { font-weight: 600; }
  .entry-score, .entry-time { text-align: right; color: var(--text-muted); }

</style>
</head>
<body>

<div id="app">
  <div class="board-title">Leaderboard</div>

  <div class="board-wrap">
    <div class="board-col-headers">
      <span>#</span>
      <span>Name</span>
      <span style="text-align:right">Score</span>
      <span style="text-align:right">Time</span>
    </div>

    <div id="entries-scroll">
      <div id="entries"></div>
    </div>
  </div>
</div>

<script>
function extractEntries(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const entries = [];
  let i = 0;

  while (i < lines.length) {
    const score = lines[i + 1] || '';
    const time  = lines[i + 2] || '';

    if (/^\d+\/\d+$/.test(score) && /^\d+:\d{2}$/.test(time)) {
      entries.push({ name: lines[i], score, time });
      i += 3;
    } else {
      i++;
    }
  }

  return entries;
}

// 🔥 DEMO DATA (replace with your input)
const sample = `Matt Dolan
8/8
0:47
David Moran
8/8
0:51
Ita Langton
8/8
0:53
Colin Melody
8/8
0:54
Emer O Shaughnessy
8/8
0:57
Eileen Healy
8/8
1:04
Ross Tuite
8/8
1:07
Gemma Oaasegi
8/8
1:07
Maryssa Beale
8/8
1:08
Ciara O Herlihy
8/8
1:08
Brian Callaghan
8/8
1:09
John Kehoe
8/8
1:10`;

const entries = extractEntries(sample);

const container = document.getElementById('entries');

entries.forEach((e, i) => {
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `
    <span class="entry-pos ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</span>
    <span class="entry-name">${e.name}</span>
    <span class="entry-score">${e.score}</span>
    <span class="entry-time">${e.time}</span>
  `;
  container.appendChild(div);
});

// 🔥 AUTO SCROLL
let scrollPos = 0;

setTimeout(() => {
  setInterval(() => {
    scrollPos += 1;
    container.style.transform = `translateY(-${scrollPos}px)`;
  }, 30); // speed
}, 2000); // wait before scrolling

</script>

</body>
</html>
